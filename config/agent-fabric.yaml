schemaVersion: 1

allowedAdapters:
  - claude-agent-sdk
  - codex-app-server
  - pi-rpc
  - agy
  - cursor-agent
  - kiro-acp

# Provider adapters join the daemon only after their compatibility entry is
# enabled, contract-conformant and listed here. Removing all entries restores the
# coordination-only profile while preserving the provider allow-list above.
activeAdapters:
  - claude-agent-sdk
  - codex-app-server
  - agy
  - cursor-agent

allowedProfiles:
  - headless
  - observed
  - interactive
  - paired-visible
  - paired-observed

adapters:
  claude-agent-sdk:
    command:
      - node
      - "--import"
      - "${AGENTS_HOME}/node_modules/tsx/dist/loader.mjs"
      - "--conditions=source"
      - "${AGENTS_HOME}/runtime/agent-fabric/src/adapters/providers/claude-agent-sdk.ts"
      - --journal
      - "${FABRIC_STATE_DIRECTORY}/adapters/claude-agent-sdk.sqlite3"
  codex-app-server:
    command:
      - node
      - "--import"
      - "${AGENTS_HOME}/node_modules/tsx/dist/loader.mjs"
      - "--conditions=source"
      - "${AGENTS_HOME}/runtime/agent-fabric/src/adapters/providers/codex-app-server.ts"
      - --journal
      - "${FABRIC_STATE_DIRECTORY}/adapters/codex-app-server.sqlite3"
  pi-rpc:
    command:
      - node
      - "--import"
      - "${AGENTS_HOME}/node_modules/tsx/dist/loader.mjs"
      - "--conditions=source"
      - "${AGENTS_HOME}/runtime/agent-fabric/src/adapters/providers/optional/pi-rpc.ts"
      - --journal
      - "${FABRIC_STATE_DIRECTORY}/adapters/pi-rpc.sqlite3"
  agy:
    command:
      - node
      - "--import"
      - "${AGENTS_HOME}/node_modules/tsx/dist/loader.mjs"
      - "--conditions=source"
      - "${AGENTS_HOME}/runtime/agent-fabric/src/adapters/providers/optional/agy.ts"
      - --journal
      - "${FABRIC_STATE_DIRECTORY}/adapters/agy.sqlite3"
  cursor-agent:
    command:
      - node
      - "--import"
      - "${AGENTS_HOME}/node_modules/tsx/dist/loader.mjs"
      - "--conditions=source"
      - "${AGENTS_HOME}/runtime/agent-fabric/src/adapters/providers/optional/cursor-agent.ts"
      - --journal
      - "${FABRIC_STATE_DIRECTORY}/adapters/cursor-agent.sqlite3"
  kiro-acp:
    command:
      - node
      - "--import"
      - "${AGENTS_HOME}/node_modules/tsx/dist/loader.mjs"
      - "--conditions=source"
      - "${AGENTS_HOME}/runtime/agent-fabric/src/adapters/providers/optional/kiro-acp.ts"
      - --journal
      - "${FABRIC_STATE_DIRECTORY}/adapters/kiro-acp.sqlite3"

workspaceRoots:
  - "${AGENTS_HOME}"

limits:
  maximumConcurrentProviderTurns: 8
