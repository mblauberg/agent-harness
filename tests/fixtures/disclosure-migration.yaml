schema: disclosure-migration.v1

ambient:
  - section: "HARNESS preamble: authority hierarchy"
    disposition: "retain (condensed; date + doc paths removed)"
    destination: "—"
  - section: "Topology: chair/equal-primary, writer partition, author≠certifier"
    disposition: "retain core"
    destination: "pairing/pane depth → `orchestrate`"
  - section: "Lifecycle map + mandatory user-approval list"
    disposition: "retain condensed"
    destination: "profile/receipt detail → `deliver`"
  - section: "Risk tiers + standing git/worktree envelope"
    disposition: "retain"
    destination: "runbook pointers → repo-surface (MAINTAINING.md)"
  - section: "Routing paragraph"
    disposition: "retain 2-line invariant"
    destination: "mechanics/degradation → `orchestrate`"
  - section: "Provider-controls/compaction cadence"
    disposition: "strip"
    destination: "`session`"
  - section: "Review-pressure table"
    disposition: "retain"
    destination: "—"
  - section: "Context/evidence: memory rule, evidence-over-confidence"
    disposition: "retain 2 lines"
    destination: "receipt schema → `deliver`"
  - section: "Trigger index"
    disposition: "retain as skill-name index"
    destination: "—"
  - section: "AGENTS: objective, sub-agents, memory, git, Fabric trust, CLI, style bullets"
    disposition: "retain (path-free per D4)"
    destination: "—"
  - section: "AGENTS: GitHub (this repo only) bullet"
    disposition: "strip"
    destination: "repo-surface (MAINTAINING.md authority clause + runbook mechanics)"
  - section: "AGENTS/HARNESS: all dates"
    disposition: "remove (D10)"
    destination: "git history"

orchestrate:
  - file: trigger-boundary.md
    verdict: keep
    notes: "distinct territory"
  - file: routing-and-tiers.md
    verdict: keep
    notes: "becomes canonical home of \"route by role/tier, never memorised model IDs\" (currently triplicated)"
  - file: codex-subagents.md
    verdict: keep
    notes: "contract-tested Codex adapter"
  - file: orchestration-contract.md
    verdict: keep
    notes: "the declared public interface; dedup target"
  - file: dynamic-workflows.md
    verdict: slim
    notes: "advisory ~60 lines; must retain: Workflow contract binding, saved-workflow conventions, pointers; drop restated native Workflow docs and the run-dir list duplicated from memory-scratchpad"
  - file: paired-primary.md
    verdict: keep
    notes: "replace its Fabric-vs-Herdr restatement with a pointer"
  - file: herdr-panes.md
    verdict: keep
    notes: "third-party CLI contract, version-pinned"
  - file: layering-and-context.md
    verdict: keep
    notes: "canonical for worker caps (3–5)"
  - file: retrieval-and-tool-routing.md
    verdict: keep
    notes: "worker-brief block becomes a pointer to orchestration-contract's worker contract"
  - file: verification.md
    verdict: keep
    notes: "absorbs debate-and-panels content"
  - file: debate-and-panels.md
    verdict: merge-then-delete
    notes: "merge into verification.md, then delete; the approved non-archive removal (D8)"
  - file: domain-adaptation.md
    verdict: keep
    notes: "distinct"
  - file: system-design-patterns.md
    verdict: archive
    notes: "archive to `docs/research/`; orphaned survey; loader entry removed; research index entry added"
  - file: evaluation-and-observability.md
    verdict: keep
    notes: "distinct angle"
  - file: memory-scratchpad.md
    verdict: keep
    notes: "canonical run-dir schema"
  - file: cli-headless.md
    verdict: keep
    notes: "routing section becomes a pointer; load-bearing for cross-verify"
  - file: autonomous-implementation.md
    verdict: keep
    notes: "consumed by autopilot"
