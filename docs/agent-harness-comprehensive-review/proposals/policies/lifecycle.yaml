schemaVersion: 1
policyId: default-agentic-sdlc
states:
- intake
- explore
- scope
- approval
- plan
- execute
- verify
- review
- acceptance
- effect-gate
- release
- observe
- diagnose
- retrospect
- done
- blocked
- stopped
routes:
  direct:
    eligibleWhen:
    - outcome-clear
    - low-risk
    - reversible
    - strong-oracle
    - no-external-effect
    - authority-present
    sequence:
    - intake
    - plan
    - execute
    - verify
    - review
    - acceptance
    - done
  scoped:
    sequence:
    - intake
    - explore
    - scope
    - approval
    - plan
    - execute
    - verify
    - review
    - acceptance
    - done
  incident:
    sequence:
    - intake
    - diagnose
    - approval
    - plan
    - execute
    - verify
    - review
    - observe
    - retrospect
    - done
transitions:
- from: verify
  'on': deterministic-failure
  to: execute
- from: review
  'on': bounded-rework
  to: execute
  maximumDefaultCycles: 2
- from: review
  'on': scope-or-authority-drift
  to: scope
- from: acceptance
  'on': external-effect-needed
  to: effect-gate
- from: effect-gate
  'on': authorised
  to: release
- from: observe
  'on': outcome-failure
  to: diagnose
approvalDigestIncludes:
- outcome
- non-goals
- specifications
- repositories
- write-scopes
- authority-profiles
- providers
- budgets
- risk-controls
- external-effects
- acceptance-criteria
- expiry
reviewPolicy:
  trivial:
  - deterministic-evidence
  - fresh-native-review-when-useful
  substantial:
  - deterministic-evidence
  - fresh-native-review
  - other-primary-load-bearing-review
  highRisk:
  - deterministic-evidence
  - fresh-native-review
  - other-primary-review
  - specialist-or-bonus-family
  crucialEffect:
  - deterministic-evidence
  - independent-security-or-domain-review
  - explicit-human-gate
  blockingBasis: evidence-and-criteria-not-model-votes
sessionRotation:
  signals:
  - phase-boundary-after-broad-scope
  - chair-transfer
  - context-health-low
  - multiple-compactions
  - obsolete-exploration-dominates
  - long-dormancy
  requiresCanonicalHandoff: true
dynamicTopology:
  allowedWithinApproval: true
  record:
  - reason
  - prior-topology
  - new-topology
  - budget-effect
  - authority-check
