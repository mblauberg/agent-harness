schemaVersion: 1
harness:
  id: agent-harness
  stability: pre-release
  constitution: HARNESS.md
  sharedInstructions: AGENTS.md
  defaultLifecyclePolicy: policies/lifecycle.yaml
distribution:
  profiles:
    core:
      providers:
      - codex
      - claude
      packages:
      - protocol
      - fabric
      - adapter-codex
      - adapter-claude
      - console-core
      - console-cli
      - installer
    full:
      extends: core
      providers:
      - herdr
      - cursor
      - agy
      - kiro
      - pi
      packages:
      - adapter-herdr
  installModes:
  - copy
  - link
  scopes:
  - user
  - project
packages:
- id: protocol
  path: runtime/agent-fabric-protocol
  role: public-contract
- id: fabric
  path: runtime/agent-fabric
  role: control-evidence-plane
- id: adapter-codex
  path: runtime/agent-fabric/src/adapters/providers/codex-app-server.ts
  role: provider-adapter
- id: adapter-claude
  path: runtime/agent-fabric/src/adapters/providers/claude-agent-sdk.ts
  role: provider-adapter
- id: adapter-herdr
  path: runtime/agent-fabric-herdr
  role: optional-presentation-control
- id: console-core
  path: runtime/agent-fabric-console
  role: operator-projection
providers:
  codex:
    support: core
    family: openai
    sessionBoundary: app-server
    capabilityDiscovery: native
    requiredProfiles:
    - review-readonly
    - workspace-write-offline
  claude:
    support: core
    family: anthropic
    sessionBoundary: agent-sdk
    capabilityDiscovery: native
    requiredProfiles:
    - review-readonly
    - workspace-write-offline
  herdr:
    support: optional
    authority: none
    role: visibility-and-wake
  cursor:
    support: optional
  agy:
    support: optional
  kiro:
    support: optional
  pi:
    support: optional
policies:
  lifecycle: policies/lifecycle.yaml
  authorityProfiles: policies/authority-profiles.yaml
  retention: policies/retention.yaml
  effects: policies/effects.yaml
  routing: policies/routing.yaml
schemas:
  intakeDecision: schemas/intake-decision.schema.json
  executionPlan: schemas/execution-plan.schema.json
  backlogItem: schemas/backlog-item.schema.json
  authorityProfile: schemas/authority-profile.schema.json
