schema_version: 1
dataset_id: skill-portfolio-routing-metric-holdout-20260711-v6
split: fresh-post-metric-repair-holdout
cases:
  - id: m01
    category: requirements-before-build
    critical: true
    prompt: This feature request is still vague. Stress-test the trade-offs and turn it into an approved specification, user stories, acceptance criteria, and recorded decisions before anyone codes.
    expected:
      primary_skill: scope
      required_companion_skills: []
      allowed_companion_skills: [engineering-docs, engineering-writing, grill-me, prototype]
  - id: m02
    category: first-failing-test
    critical: true
    prompt: Write the first failing public-interface test for this behaviour change, then stop at red so the implementation owner can take over.
    expected:
      primary_skill: tdd
      required_companion_skills: []
      allowed_companion_skills: [implement]
  - id: m03
    category: session-continuity
    critical: false
    prompt: Start this substantial repository session by reading its live state and instructions, then maintain a compact handoff checkpoint if context compacts or the session ends.
    expected:
      primary_skill: session
      required_companion_skills: []
      allowed_companion_skills: [work-map]
  - id: m04
    category: effort-continuity
    critical: false
    prompt: This migration spans several sessions and agents. Create the durable effort-level map of completed work, active slice, blockers, ownership, evidence, and next steps.
    expected:
      primary_skill: work-map
      required_companion_skills: []
      allowed_companion_skills: [orchestrate, session]
  - id: m05
    category: promotion-after-acceptance
    critical: true
    prompt: The exact artifact digest has human acceptance and separate promotion authority. Activate it for the named external recipients, prove the visible outcome, and retain containment and observation evidence.
    expected:
      primary_skill: release
      required_companion_skills: []
      allowed_companion_skills: []
  - id: m06
    category: evidence-only-review
    critical: true
    prompt: Audit this commit and its dependency cone for defects, state and type boundary regressions, concurrency hazards, and structural simplification. Do not change files.
    expected:
      primary_skill: code-review
      required_companion_skills: []
      allowed_companion_skills: [typescript-clean-code]
  - id: m07
    category: structural-simplification
    critical: true
    prompt: Preserve all observable contracts while consolidating duplicate ownership and simplifying the structure in verified slices. Delete only after callers, registries, configuration, and fallback paths are disproved.
    expected:
      primary_skill: refactor
      required_companion_skills: []
      allowed_companion_skills: [code-review, tdd]
  - id: m08
    category: ui-read-only-audit
    critical: true
    prompt: Return a read-only evidence matrix and prioritised findings for this frontend's accessibility, responsive states, hierarchy, interaction clarity, errors, and visual craft.
    expected:
      primary_skill: frontend-review
      required_companion_skills: []
      allowed_companion_skills: [code-review, playwright, react-performance, web-stack-conventions]
  - id: m09
    category: skill-quality-diagnosis
    critical: true
    prompt: Examine the current skill for trigger collisions, false negatives, authority drift, token overhead, unsafe helpers, and weak eval coverage. Report the audit without editing it.
    expected:
      primary_skill: skill-audit
      required_companion_skills: []
      allowed_companion_skills: [code-review, evaluate, orchestrate]
  - id: m10
    category: explicit-chat-compression
    critical: false
    prompt: Answer this low-risk progress note in caveman adaptive mode. Be extremely compact while preserving the exact pass count, pending state, command, and uncertainty.
    expected:
      primary_skill: caveman
      required_companion_skills: []
      allowed_companion_skills: []
  - id: m11
    category: finite-agent-coordination
    critical: false
    prompt: Split this finite cross-cutting review among independent agents with non-overlapping ownership, typed evidence returns, bounded budgets, and one central adjudicator.
    expected:
      primary_skill: orchestrate
      required_companion_skills: []
      allowed_companion_skills: [code-review, evaluate]
  - id: m12
    category: persistent-agent-lab
    critical: true
    prompt: Launch a durable autonomous lab for this open-ended programme, recover across sessions and crashes, preserve human gates, and keep making progress until I explicitly write STOP.
    expected:
      primary_skill: autonomous-lab
      required_companion_skills: []
      allowed_companion_skills: [deliver, evaluate, orchestrate, session, work-map]
