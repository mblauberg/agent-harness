      required_companion_skills: []
      allowed_companion_skills: [code-review]
  - id: r12
    category: persistent-topology
    critical: true
    prompt: Run a large multi-session autonomous research lab with durable recovery state and human gates. Keep progressing across crashes and compactions until I explicitly write STOP.
