name: Skill proposal
description: Propose a new Agent Skill, or a material revision to an existing one.
title: "[skill]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: >-
        Every skill in the catalogue costs tokens in every session and competes
        with its neighbours for routing, so the bar is high and it is set in
        MAINTAINING.md ("Change a skill", "Promote and retire"). These fields
        are that bar. A capability that cannot fill them is usually a project
        rule, a script or a hook, or a reference inside an existing skill: that
        is a good outcome, not a rejection.

  - type: input
    id: name
    attributes:
      label: Skill name
      description: >-
        kebab-case capability name. Related skills use parallel names
        (engineering-writing, academic-writing, legal-writing).
      placeholder: threat-modelling
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: One-line description
      description: >-
        This is all a model sees when it routes. Put the trigger terms and the
        nearest exclusion inside the first 250 characters. Shape: "Use for X.
        Not for Y; use Z."
      placeholder: "Use for X, Y and Z. Not for W; use <nearest-skill>."
    validations:
      required: true

  - type: textarea
    id: triggers
    attributes:
      label: Trigger terms
      description: >-
        The words and phrasings a user would really say to reach this skill, not
        the vocabulary you would prefer they used.
    validations:
      required: true

  - type: input
    id: nearest
    attributes:
      label: Nearest existing skill
      description: The one skill in skills/ that a reasonable person would reach for instead.
      placeholder: code-review
    validations:
      required: true

  - type: textarea
    id: boundary
    attributes:
      label: Why this is not that skill
      description: >-
        Name the difference in trigger, authority, artifacts or completion
        gates. A skill that cannot hold a stable boundary against its nearest
        neighbour gets merged into it rather than added beside it.
    validations:
      required: true

  - type: textarea
    id: fixtures
    attributes:
      label: Trigger fixtures
      description: >-
        At least two of each, with the exact route you expect (primary skill,
        plus any companion).


        Positive: requests that must route here.

        Negative: requests that must not route here, and where they go instead.

        Boundary: requests that sit right against the nearest skill, where the
        named owner must win.
      value: |
        Positive:
        1. "..." -> this skill
        2. "..." -> this skill

        Negative:
        1. "..." -> <other-skill>
        2. "..." -> <other-skill>

        Boundary:
        1. "..." -> <nearest-skill>, not this one, because ...
        2. "..." -> this skill, not <nearest-skill>, because ...
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence from two or more projects
      description: >-
        A skill earns global promotion after proving useful in at least two
        projects. Name them (redact private names), and for each say what it
        produced and what went wrong, or would have gone wrong, without it.
        Generalise project-specific values into knobs.
    validations:
      required: true

  - type: dropdown
    id: container
    attributes:
      label: Smallest correct container
      description: >-
        MAINTAINING.md asks for the smallest container that holds the
        capability. Which is this, and be honest: a global skill is the most
        expensive answer.
      options:
        - A global Agent Skill (this proposal)
        - An always-loaded project rule
        - A deterministic script or hook
        - A reference file inside an existing skill
        - An external MCP or app capability
        - An independently versioned plugin
    validations:
      required: true

  - type: textarea
    id: container-why
    attributes:
      label: Why a global skill and not the cheaper container
      description: >-
        If you chose anything other than a global skill above, say so here and
        we will route it. If you chose a global skill, argue why the cheaper
        containers fail.
    validations:
      required: true

  - type: checkboxes
    id: budget
    attributes:
      label: Cost and safety
      options:
        - label: SKILL.md will be roughly 500 words or less, with depth in narrowly named reference files loaded only when needed.
          required: true
        - label: The description fits the catalogue budget (the canonical catalogue stays at or below 8,000 characters).
          required: true
        - label: The skill grants no authority by itself; metadata and tool lists may narrow invocation but never widen permission.
          required: true
        - label: Any third-party material I am adapting has a redistribution licence, and I will preserve its notices.
          required: true
