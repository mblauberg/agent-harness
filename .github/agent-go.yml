# Provider lane for the agent-go label trigger
# (.github/workflows/agent-go-trigger.yml).
#
# Swapping providers is a one-line change: edit this value and nothing else
# in the workflow, the gate, or the dispatch payload.
#
#   codex  - default lane. Codex Cloud's GitHub connector (ChatGPT
#            subscription). Requires the AGENT_GO_CODEX_DISPATCH_URL repo
#            secret (maintainer one-time setup).
#   claude - swap lane. Claude Code's GitHub-triggered Routine (subscription
#            credit, managed via the RemoteTrigger routine). Requires the
#            AGENT_GO_CLAUDE_DISPATCH_URL repo secret (maintainer one-time
#            setup).
#
# See docs/runbooks/github-workflow.md#agent-go-trigger for the security
# model and the exact one-time maintainer setup for each lane.
provider: codex
