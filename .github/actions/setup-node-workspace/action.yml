name: Set up Node.js workspace
description: >-
  Set up pinned Node.js and npm, then install locked workspace dependencies.
  Shared by every CI job that builds the npm workspace so the toolchain
  contract lives in exactly one place.

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Pin npm
      shell: bash
      run: |
        npm install --global npm@11.12.1
        test "$(npm --version)" = "11.12.1"
    - name: Install locked workspace dependencies
      shell: bash
      run: npm ci --no-audit --no-fund
