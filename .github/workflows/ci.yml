name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install pytest pyyaml
      - run: scripts/check-harness
