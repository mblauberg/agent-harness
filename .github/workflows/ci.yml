name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow grants nothing by default; every job
# declares exactly what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path filtering happens here, never via workflow-level `paths:`, so the
  # aggregate `ci-status` check below always reports and merges can never
  # deadlock on a required check that stays pending.
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      # Pushes to main always run every job: full post-merge verification
      # and warm caches on the default branch for pull requests to reuse.
      harness: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.harness }}
      fabric: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.fabric }}
      console: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.console }}
      herdr: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.herdr }}
      review-portal-supervisor: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.review-portal-supervisor }}
      workflows: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.workflows }}
    steps:
      - name: Filter changed paths
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # Invariant: every tracked file matches at least one filter, so no
          # change can skip every build job while ci-status reports green.
          # The harness filter covers every surface scripts/check-harness
          # validates — skills, docs, root documents, release attribution
          # files, and the repo-wide scan residue (CHANGELOG.md, .gitignore)
          # — so policy-gated changes always run the policy gate.
          # tests/test_ci_repository_assurance_policy.py enforces the
          # invariant against `git ls-files` (PR #168 repair cycle 2).
          filters: |
            ci-contract: &ci-contract
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            node-workspace: &node-workspace
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'runtime/agent-fabric-protocol/**'
            harness:
              - *ci-contract
              - *node-workspace
              - '.github/**'
              - 'config/**'
              - 'docs/**'
              - 'evals/**'
              - 'runtime/**'
              - 'scripts/**'
              - 'skills/**'
              - 'tests/**'
              - '.gitignore'
              - 'ACKNOWLEDGEMENTS.md'
              - 'AGENTS.md'
              - 'CHANGELOG.md'
              - 'HARNESS.md'
              - 'LICENSE'
              - 'LICENSES/**'
              - 'MAINTAINING.md'
              - 'NOTICE'
              - 'README.md'
              - 'SECURITY.md'
              - 'THIRD_PARTY_NOTICES.md'
            fabric:
              - *ci-contract
              - *node-workspace
              - 'config/**'
              - 'runtime/agent-fabric/**'
              # Executed by fabric tests: the model-routing acceptance suite
              # runs scripts/model-route, and the delivery-run fixture runs
              # skills/deliver/scripts/*.py. Exact executed dependencies
              # only — the policy test rejects broader docs/skills globs.
              - 'scripts/model-route'
              - 'skills/deliver/scripts/**'
            console:
              - *ci-contract
              - *node-workspace
              - 'runtime/agent-fabric/**'
              - 'runtime/agent-fabric-console/**'
            herdr:
              - *ci-contract
              - *node-workspace
              - 'runtime/agent-fabric-herdr/**'
            review-portal-supervisor:
              - *ci-contract
              - 'runtime/agent-fabric-review-portal-supervisor/**'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/zizmor.yml'

  harness:
    name: Harness policy and Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.harness == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Node.js workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Build TypeScript workspace for schema verification
        run: npm run build:types
      - name: Verify committed protocol schemas
        run: npm run schema:check:generated
      - name: Build workspace for source-tree wrapper tests
        run: npm run build
      - name: Verify generated protocol schema tree is unchanged
        run: |
          test -z "$(git status --porcelain --untracked-files=all -- runtime/agent-fabric-protocol/schemas)"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install harness test dependencies
        run: python -m pip install pytest pyyaml
      - name: Run harness gate
        run: scripts/check-harness

  fabric:
    name: Agent fabric TypeScript, tests and audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.fabric == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Assert protocol build starts clean
        run: test ! -e runtime/agent-fabric-protocol/dist
      - name: Set up Node.js workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Build workspace in dependency order
        run: npm run build
      - name: Run protocol tests
        run: npm run test --workspace=@local/agent-fabric-protocol
      - name: Run fabric typecheck, build and tests
        env:
          AGENT_FABRIC_PORTABLE_TESTS: "1"
        run: |
          npm run schema:check --workspace=@local/agent-fabric
          npm run typecheck --workspace=@local/agent-fabric
          npm run test --workspace=@local/agent-fabric
      - name: Verify local protocol dependency was built
        run: test -f runtime/agent-fabric-protocol/dist/index.d.ts
      - name: Run fabric evaluation suite
        run: npm run test:evaluation --workspace=@local/agent-fabric
      - name: Run fabric load suite
        run: npm run test:load --workspace=@local/agent-fabric
      - name: Audit production dependencies
        run: npm audit --workspace=@local/agent-fabric --omit=dev --audit-level=high

  review-portal-supervisor:
    name: Review portal supervisor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.review-portal-supervisor == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    defaults:
      run:
        working-directory: runtime/agent-fabric-review-portal-supervisor
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy --component rustfmt
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: runtime/agent-fabric-review-portal-supervisor
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Verify checked-out SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Check formatting
        run: cargo fmt --check
      - name: Require a dependency-free locked graph
        run: |
          package_count="$(awk '/^\[\[package\]\]/{count++} END{print count+0}' Cargo.lock)"
          test "$package_count" -eq 1
          cargo metadata --locked --offline --no-deps --format-version 1 >/dev/null
      - name: Run Clippy
        run: cargo clippy --locked --offline --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --locked --offline
      - name: Prove nominal relay launch closes ambient descriptors
        run: bash -c 'exec 9</dev/null; cargo test --locked --offline --test portal_relay -- --test-threads=1'

  console:
    name: Agent fabric Console, evaluation, load and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.console == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Build workspace in dependency order
        run: npm run build
      - name: Run Console typecheck, build and tests
        run: |
          npm run typecheck --workspace=@local/agent-fabric-console
          npm run test --workspace=@local/agent-fabric-console
      - name: Run Console evaluation suite
        run: npm run test:evaluation --workspace=@local/agent-fabric-console
      - name: Run Console load suite
        run: npm run test:load --workspace=@local/agent-fabric-console
      - name: Audit Console production dependencies
        run: npm audit --workspace=@local/agent-fabric-console --omit=dev --audit-level=high

  herdr:
    name: Agent fabric Herdr adapter and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.herdr == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Build workspace in dependency order
        run: npm run build
      - name: Run Herdr typecheck, build and tests
        run: |
          npm run typecheck --workspace=@local/agent-fabric-herdr
          npm run test --workspace=@local/agent-fabric-herdr
      - name: Audit Herdr production dependencies
        run: npm audit --workspace=@local/agent-fabric-herdr --omit=dev --audit-level=high

  zizmor:
    name: Workflow security lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.workflows == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: "1.27.0"
          # Audit exactly the surfaces this job is path-filtered on.
          inputs: ".github/workflows .github/actions"
          config: .github/zizmor.yml
          online-audits: "false"
          advanced-security: "false"
          annotations: "true"

  # Single required check. Succeeds only when every needed job either
  # succeeded or was skipped by the path filter; fails closed on any
  # failure or cancellation, including detect-changes itself.
  ci-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    needs:
      - detect-changes
      - harness
      - fabric
      - review-portal-supervisor
      - console
      - herdr
      - zizmor
    if: always()
    steps:
      - name: Fail unless every needed job succeeded or was skipped by filter
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value.result)"'
          blocking="$(echo "$NEEDS_JSON" | jq -r \
            'to_entries[]
             | select(.value.result != "success" and .value.result != "skipped")
             | "\(.key)=\(.value.result)"')"
          if [ -n "$blocking" ]; then
            echo "Blocking job results:"
            echo "$blocking"
            exit 1
          fi
          echo "All needed jobs succeeded or were skipped by the path filter."
