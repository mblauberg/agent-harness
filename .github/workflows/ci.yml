name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness policy and Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install harness test dependencies
        run: python -m pip install pytest pyyaml
      - name: Run harness gate
        run: scripts/check-harness

  fabric:
    name: Agent fabric TypeScript, tests and audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            runtime/agent-fabric/package-lock.json
            runtime/agent-fabric-protocol/package-lock.json
      - name: Assert protocol build starts clean
        working-directory: runtime/agent-fabric
        run: test ! -e ../agent-fabric-protocol/dist
      - name: Install locked fabric dependencies
        working-directory: runtime/agent-fabric
        run: npm ci
      - name: Run fabric typecheck, build and tests
        working-directory: runtime/agent-fabric
        env:
          AGENT_FABRIC_PORTABLE_TESTS: "1"
        run: npm run check
      - name: Verify local protocol dependency was built
        working-directory: runtime/agent-fabric
        run: test -f ../agent-fabric-protocol/dist/index.d.ts
      - name: Run fabric evaluation suite
        working-directory: runtime/agent-fabric
        run: npm run test:evaluation
      - name: Run fabric load suite
        working-directory: runtime/agent-fabric
        run: npm run test:load
      - name: Audit production dependencies
        working-directory: runtime/agent-fabric
        run: npm audit --omit=dev --audit-level=high
