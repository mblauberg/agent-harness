name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness policy and Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm
        run: |
          npm install --global npm@11.12.1
          test "$(npm --version)" = "11.12.1"
      - name: Install locked workspace dependencies
        run: npm ci --no-audit --no-fund
      - name: Build TypeScript workspace for schema verification
        run: npm run build:types
      - name: Verify committed protocol schemas
        run: npm run schema:check:generated
      - name: Build workspace for source-tree wrapper tests
        run: npm run build
      - name: Verify generated protocol schema tree is unchanged
        run: |
          test -z "$(git status --porcelain --untracked-files=all -- runtime/agent-fabric-protocol/schemas)"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install harness test dependencies
        run: python -m pip install pytest pyyaml
      - name: Run harness gate
        run: scripts/check-harness

  fabric:
    name: Agent fabric TypeScript, tests and audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm
        run: |
          npm install --global npm@11.12.1
          test "$(npm --version)" = "11.12.1"
      - name: Assert protocol build starts clean
        run: test ! -e runtime/agent-fabric-protocol/dist
      - name: Install locked workspace dependencies
        run: npm ci --no-audit --no-fund
      - name: Build workspace in dependency order
        run: npm run build
      - name: Run protocol tests
        run: npm run test --workspace=@local/agent-fabric-protocol
      - name: Run fabric typecheck, build and tests
        env:
          AGENT_FABRIC_PORTABLE_TESTS: "1"
        run: |
          npm run schema:check --workspace=@local/agent-fabric
          npm run typecheck --workspace=@local/agent-fabric
          npm run test --workspace=@local/agent-fabric
      - name: Verify local protocol dependency was built
        run: test -f runtime/agent-fabric-protocol/dist/index.d.ts
      - name: Run fabric evaluation suite
        run: npm run test:evaluation --workspace=@local/agent-fabric
      - name: Run fabric load suite
        run: npm run test:load --workspace=@local/agent-fabric
      - name: Audit production dependencies
        run: npm audit --workspace=@local/agent-fabric --omit=dev --audit-level=high

  review-portal-supervisor:
    name: Review portal supervisor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    defaults:
      run:
        working-directory: runtime/agent-fabric-review-portal-supervisor
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy --component rustfmt
      - name: Verify checked-out SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Check formatting
        run: cargo fmt --check
      - name: Require a dependency-free locked graph
        run: |
          package_count="$(awk '/^\[\[package\]\]/{count++} END{print count+0}' Cargo.lock)"
          test "$package_count" -eq 1
          cargo metadata --locked --offline --no-deps --format-version 1 >/dev/null
      - name: Run Clippy
        run: cargo clippy --locked --offline --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --locked --offline
      - name: Prove nominal relay launch closes ambient descriptors
        run: bash -c 'exec 9</dev/null; cargo test --locked --offline --test portal_relay -- --test-threads=1'

  console:
    name: Agent fabric Console, evaluation, load and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm
        run: |
          npm install --global npm@11.12.1
          test "$(npm --version)" = "11.12.1"
      - name: Install locked workspace dependencies
        run: npm ci --no-audit --no-fund
      - name: Build workspace in dependency order
        run: npm run build
      - name: Run Console typecheck, build and tests
        run: |
          npm run typecheck --workspace=@local/agent-fabric-console
          npm run test --workspace=@local/agent-fabric-console
      - name: Run Console evaluation suite
        run: npm run test:evaluation --workspace=@local/agent-fabric-console
      - name: Run Console load suite
        run: npm run test:load --workspace=@local/agent-fabric-console
      - name: Audit Console production dependencies
        run: npm audit --workspace=@local/agent-fabric-console --omit=dev --audit-level=high

  herdr:
    name: Agent fabric Herdr adapter and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Pin npm
        run: |
          npm install --global npm@11.12.1
          test "$(npm --version)" = "11.12.1"
      - name: Install locked workspace dependencies
        run: npm ci --no-audit --no-fund
      - name: Build workspace in dependency order
        run: npm run build
      - name: Run Herdr typecheck, build and tests
        run: |
          npm run typecheck --workspace=@local/agent-fabric-herdr
          npm run test --workspace=@local/agent-fabric-herdr
      - name: Audit Herdr production dependencies
        run: npm audit --workspace=@local/agent-fabric-herdr --omit=dev --audit-level=high
