version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Only labels declared in .github/labels.yml; without this Dependabot
    # recreates its per-ecosystem default labels that the label sync prunes.
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    groups:
      workspace-development-dependencies:
        dependency-type: development
      workspace-production-dependencies:
        dependency-type: production
