schema_version: 1
target_skill: orchestrate
cases:
  - id: topology-parallel-bounded-slices
    prompt: "Audit three independent packages against one stable checklist; each worker returns source-anchored findings without writing shared state."
    tags: [decomposable, bounded]
    factors:
      independent_information: true
      stable_interfaces: true
      non_overlapping_writes: true
      independently_checkable_returns: true
      expected_information_gain: 3
      coordination_shared_state_tool_density_cost: 1
    expected_topology: parallel
  - id: topology-parallel-partitioned-writers
    prompt: "Implement two independent adapters in isolated worktrees with contract tests and one serial integration owner."
    tags: [decomposable, bounded, partitioned-writes]
    factors:
      independent_information: true
      stable_interfaces: true
      non_overlapping_writes: true
      independently_checkable_returns: true
      expected_information_gain: 3
      coordination_shared_state_tool_density_cost: 2
    expected_topology: parallel
  - id: topology-serial-low-marginal-value
    prompt: "Compare two independent, stable, tiny documentation lists with namespaced read-only returns that can each be checked, when setup and synthesis cost exceeds added coverage."
    tags: [bounded, low-marginal-value, isolates-value-gate]
    factors:
      independent_information: true
      stable_interfaces: true
      non_overlapping_writes: true
      independently_checkable_returns: true
      expected_information_gain: 1
      coordination_shared_state_tool_density_cost: 2
    expected_topology: serial
  - id: topology-serial-unstable-interface
    prompt: "Investigate two independent high-value adapter questions with cited read-only returns while their shared interface remains unsettled."
    tags: [unstable-interface, isolates-structural-gate]
    factors:
      independent_information: true
      stable_interfaces: false
      non_overlapping_writes: true
      independently_checkable_returns: true
      expected_information_gain: 3
      coordination_shared_state_tool_density_cost: 1
    expected_topology: serial
  - id: topology-serial-tightly-coupled
    prompt: "Repair one state-machine transition whose next edit depends on reproducing the preceding result."
    tags: [tightly-coupled]
    factors:
      independent_information: false
      stable_interfaces: false
      non_overlapping_writes: true
      independently_checkable_returns: false
      expected_information_gain: 1
      coordination_shared_state_tool_density_cost: 2
    expected_topology: serial
  - id: topology-serial-shared-error
    prompt: "Debug two symptoms that share one unknown root cause and one mutable test fixture."
    tags: [shared-error]
    factors:
      independent_information: false
      stable_interfaces: false
      non_overlapping_writes: false
      independently_checkable_returns: false
      expected_information_gain: 2
      coordination_shared_state_tool_density_cost: 3
    expected_topology: serial
  - id: topology-serial-overlapping-writes
    prompt: "Have two workers edit the same transaction owner and generated schema concurrently."
    tags: [overlapping-writes]
    factors:
      independent_information: true
      stable_interfaces: true
      non_overlapping_writes: false
      independently_checkable_returns: true
      expected_information_gain: 3
      coordination_shared_state_tool_density_cost: 3
    expected_topology: serial
  - id: topology-serial-tool-density
    prompt: "Split a small check across agents that must take turns using the same scarce stateful tool and cannot verify partial returns alone."
    tags: [tool-density]
    factors:
      independent_information: true
      stable_interfaces: true
      non_overlapping_writes: true
      independently_checkable_returns: false
      expected_information_gain: 2
      coordination_shared_state_tool_density_cost: 3
    expected_topology: serial
