schema_version: 1
target_skill: release
cases:
  - {id: s05-release-positive, relation: positive, prompt: "Promote this exact human-accepted artifact digest to the named target under separate target-bound release authority.", tags: [spec05, direct], expected: {primary_skill: release, companion_skills: []}}
  - {id: s05-release-negative, relation: negative, prompt: "Implement the approved change and stop after acceptance; no deployment or external promotion is authorised.", tags: [spec05, boundary], expected: {primary_skill: implement, companion_skills: []}}
  - {id: s05-release-adjacent, relation: adjacent, prompt: "Implement the feature through acceptance, then use a separate gate to release the pinned build to production.", tags: [spec05, composition], expected: {primary_skill: implement, companion_skills: [release]}}
  - {id: s05-release-portability, relation: portability, prompt: "With Console, Herdr and GitHub unavailable, promote the exact accepted artifact from project artifacts using the authorised target command.", tags: [spec05, portable], adapters: {console: absent, herdr: absent, github: absent}, expected: {primary_skill: release, companion_skills: []}}
