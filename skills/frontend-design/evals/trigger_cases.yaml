  - {id: q103, relation: negative, prompt: "Audit this interface source-read-only for UX and accessibility defects.", tags: [adjacent], expected: {primary_skill: frontend-review, companion_skills: []}}
  - {id: q104, relation: negative, prompt: "Profile why this React page has poor INP and a large client bundle.", tags: [adjacent], expected: {primary_skill: react-performance, companion_skills: []}}
  - {id: q105, relation: negative, prompt: "Repair this backend database migration; there is no user interface change.", tags: [adjacent], expected: {primary_skill: implement, companion_skills: []}}
  - {id: q106, relation: boundary, prompt: "Implement the approved dashboard redesign end-to-end and verify it before handoff.", tags: [composition], expected: {primary_skill: implement, companion_skills: [frontend-design]}}
