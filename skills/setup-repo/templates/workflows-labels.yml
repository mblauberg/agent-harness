# Sync the live label set from the declarative source of truth in
# .github/labels.yml. Pruning is intentional: labels absent from the file are
# deleted, so the file is the whole taxonomy.
name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml
  workflow_dispatch:

permissions: {}

# Serialise syncs: overlapping runs from rapid pushes would race the same API.
concurrency:
  group: labels-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync labels from labels.yml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
        with:
          yaml-file: .github/labels.yml
          skip-delete: false
          dry-run: false
