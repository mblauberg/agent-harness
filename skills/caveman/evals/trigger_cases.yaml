schema_version: 1
target_skill: caveman
cases:
  - {id: q028, relation: positive, prompt: "This project's AGENTS.md explicitly invokes $caveman for status replies; apply its adaptive mode without losing technical detail.", tags: [explicit-project-invocation], expected: {primary_skill: caveman, companion_skills: []}}
  - {id: q029, relation: positive, prompt: "Answer this status update in explicit caveman full mode, preserving every number.", tags: [direct], expected: {primary_skill: caveman, companion_skills: []}}
  - {id: q030, relation: positive, prompt: "Give me an aggressively compressed chat answer; fragments are fine but do not lose conditions.", tags: [direct], expected: {primary_skill: caveman, companion_skills: []}}
  - {id: q031, relation: negative, prompt: "Be brief: what is two plus two?", tags: [no-skill], expected: {primary_skill: null, companion_skills: []}}
  - {id: q032, relation: negative, prompt: "Compress this twenty-page runbook without changing commands, warnings, or obligations.", tags: [adjacent], expected: {primary_skill: engineering-writing, companion_skills: []}}
  - {id: q033, relation: negative, prompt: "Review this pull request tersely and report only genuine defects.", tags: [adjacent], expected: {primary_skill: code-review, companion_skills: []}}
  - {id: q034, relation: boundary, prompt: "Review this PR and return the verified findings in caveman mode.", tags: [composition], expected: {primary_skill: code-review, companion_skills: [caveman]}}
  - {id: q035, relation: boundary, prompt: "Use caveman mode for the chat explanation, but draft the Australian affidavit in proper court prose.", tags: [composition], expected: {primary_skill: legal-writing, companion_skills: [caveman]}}
  - {id: q036, relation: boundary, prompt: "In caveman mode, give me the safety-critical release checklist for an irreversible database migration.", tags: [composition], expected: {primary_skill: release, companion_skills: [caveman]}}
