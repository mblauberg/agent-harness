schema_version: 2
target_skill: skill-authoring
cases:
  - {id: q244, relation: positive, prompt: "Create a new Agent Skill with a compact SKILL.md, references, scripts, and trigger fixtures.", tags: [direct], expected: {primary_skill: skill-authoring, companion_skills: []}}
  - {id: q245, relation: positive, prompt: "Author a portable skill for this stable workflow and make its trigger boundary reliable.", tags: [direct], expected: {primary_skill: skill-authoring, companion_skills: []}}
  - {id: q246, relation: positive, prompt: "Scaffold a new skill using progressive disclosure and executable validation for its repeated logic.", tags: [direct], expected: {primary_skill: skill-authoring, companion_skills: []}}
  - {id: q247, relation: negative, prompt: "Audit this existing skill for overtriggering and instruction bloat without changing it.", tags: [adjacent], expected: {primary_skill: skill-audit, companion_skills: []}}
  - {id: q248, relation: negative, prompt: "Bundle these existing skills and MCP tools into a Codex plugin manifest.", tags: [no-skill], expected: {primary_skill: null, companion_skills: []}}
  - {id: q249, relation: negative, prompt: "Write a one-off system prompt for this single chat; it will not be reused.", tags: [no-skill], expected: {primary_skill: null, companion_skills: []}}
  - {id: q250, relation: boundary, prompt: "Author the new skill and design a with-without evaluation proving it improves the target task.", tags: [composition], expected: {primary_skill: skill-authoring, companion_skills: [evaluate]}}
  - {id: q251, relation: boundary, prompt: "Extract one warranted capability from this audited plugin into an original local skill.", tags: [composition], expected: {primary_skill: skill-authoring, companion_skills: [skill-audit]}}
  - {id: q252, relation: boundary, prompt: "Implement the approved new skill end-to-end through source changes, gates, review, and acceptance.", tags: [composition], expected: {primary_skill: implement, companion_skills: [skill-authoring]}}
