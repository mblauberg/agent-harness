# Canonical positive/negative/boundary routing fixtures for skill-craft.
#
# This file is validated by tests/test_skill_eval_fixtures.py: exactly 3
# positive + 3 negative + 3 boundary cases, exact case keys, exact expected
# keys, catalogue-unique ids and prompts. Richer branch/note/tool-call-trace
# fixtures (formerly the sc-* ids here) live in boundary_trace_cases.yaml,
# which is not schema-constrained by that contract test.
schema_version: 1
target_skill: skill-craft
cases:
  - {id: q700, relation: positive, prompt: "Audit this existing Agent Skill for missed triggers, false triggers, overlap, and token cost.", tags: [direct], expected: {primary_skill: skill-craft, companion_skills: []}}
  - {id: q701, relation: positive, prompt: "Create a new Agent Skill with a compact SKILL.md, references, scripts, and trigger fixtures.", tags: [direct], expected: {primary_skill: skill-craft, companion_skills: []}}
  - {id: q702, relation: positive, prompt: "Materially revise this existing skill's trigger, progressive disclosure, fixtures, and validation after its audit.", tags: [direct], expected: {primary_skill: skill-craft, companion_skills: []}}
  - {id: q703, relation: negative, prompt: "Implement the already approved skill changes and verify the harness.", tags: [adjacent], expected: {primary_skill: implement, companion_skills: []}}
  - {id: q704, relation: negative, prompt: "Retrospect on the completed delivery across routing, tools, context, and process.", tags: [adjacent], expected: {primary_skill: retrospect, companion_skills: []}}
  - {id: q705, relation: negative, prompt: "Publish these already-prepared raw Codex session transcripts to a shared archive; no audit is required.", tags: [adjacent, local-history, export], expected: {primary_skill: release, companion_skills: []}}
  - {id: q706, relation: boundary, prompt: "Audit these existing skills, then implement only the approved fixes through review and verification.", tags: [composition], expected: {primary_skill: implement, companion_skills: [skill-craft]}}
  - {id: q707, relation: boundary, prompt: "Audit this existing skill, then compare its routing and task quality against baseline with a versioned held-out benchmark.", tags: [composition], expected: {primary_skill: evaluate, companion_skills: [skill-craft]}}
  - {id: q708, relation: boundary, prompt: "Promote the workflow proven in two unrelated projects into a global skill, then run a repeatable held-out evaluation of its generalised trigger boundary.", tags: [composition], expected: {primary_skill: skill-craft, companion_skills: [evaluate]}}
