  - {id: s05-scope-negative, relation: negative, prompt: "The digest-bound scope is approved; implement the minor software change through verification.", tags: [spec05, boundary], expected: {primary_skill: implement, companion_skills: []}}
  - {id: s05-scope-adjacent, relation: adjacent, prompt: "Grill me on the highest-leverage project decision, then land the resolved scope and acceptance contract.", tags: [spec05, composition], expected: {primary_skill: scope, companion_skills: [grill-me]}}
  - {id: s05-scope-portability, relation: portability, prompt: "With Console, Herdr and GitHub unavailable, scope this request from project artifacts and return a digest-bound handoff.", tags: [spec05, portable], adapters: {console: absent, herdr: absent, github: absent}, expected: {primary_skill: scope, companion_skills: []}}
