  - {id: lifecycle-work-map-portability, relation: portability, prompt: "With Console, Herdr and GitHub unavailable, rebuild the effort route from canonical project artifacts, not live task inference.", tags: [lifecycle-alignment, portable], adapters: {console: absent, herdr: absent, github: absent}, expected: {primary_skill: work-map, companion_skills: []}}
