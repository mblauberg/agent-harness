schema_version: 1
target_skill: session
cases:
  - {id: s05-session-positive, relation: positive, prompt: "Start a fresh substantial session from the digest-bound handoff, then checkpoint before compaction.", tags: [spec05, direct], expected: {primary_skill: session, companion_skills: []}}
  - {id: s05-session-negative, relation: negative, prompt: "Create the persistent project route across runs and leads rather than a session handoff.", tags: [spec05, boundary], expected: {primary_skill: work-map, companion_skills: []}}
  - {id: s05-session-adjacent, relation: adjacent, prompt: "Checkpoint this substantial implementation and preserve only safe provider-session continuity evidence.", tags: [spec05, composition], expected: {primary_skill: session, companion_skills: [implement]}}
  - {id: s05-session-portability, relation: portability, prompt: "With Console, Herdr and GitHub unavailable, resume from project artifacts and write the authorised durable handoff.", tags: [spec05, portable], adapters: {console: absent, herdr: absent, github: absent}, expected: {primary_skill: session, companion_skills: []}}
