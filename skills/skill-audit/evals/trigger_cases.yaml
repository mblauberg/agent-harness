schema_version: 2
target_skill: skill-audit
cases:
  - {id: q235, relation: positive, prompt: "Audit this existing Agent Skill for missed triggers, false triggers, overlap, and token cost.", tags: [direct], expected: {primary_skill: skill-audit, companion_skills: []}}
  - {id: q236, relation: positive, prompt: "Review the current skill portfolio read-only for portability, security, and catalogue-budget problems.", tags: [direct], expected: {primary_skill: skill-audit, companion_skills: []}}
  - {id: q237, relation: positive, prompt: "Run a static optimise-skill assessment and propose balanced routing fixtures; do not edit source.", tags: [direct], expected: {primary_skill: skill-audit, companion_skills: []}}
  - {id: q238, relation: negative, prompt: "Create a brand-new skill for PostgreSQL migration review.", tags: [adjacent], expected: {primary_skill: skill-authoring, companion_skills: []}}
  - {id: q239, relation: negative, prompt: "Implement the already approved skill changes and verify the harness.", tags: [adjacent], expected: {primary_skill: implement, companion_skills: []}}
  - {id: q240, relation: negative, prompt: "Retrospect on the completed delivery across routing, tools, context, and process.", tags: [adjacent], expected: {primary_skill: retrospect, companion_skills: []}}
  - {id: q241, relation: boundary, prompt: "Audit these existing skills, then implement only the approved fixes through review and verification.", tags: [composition], expected: {primary_skill: implement, companion_skills: [skill-audit]}}
  - {id: q242, relation: boundary, prompt: "Compare the skill's routing and task quality against baseline with a versioned held-out benchmark.", tags: [composition], expected: {primary_skill: evaluate, companion_skills: [skill-audit]}}
  - {id: q243, relation: boundary, prompt: "Use completed-run evidence to assess recurring skill failures as one lane of the retrospective.", tags: [composition], expected: {primary_skill: retrospect, companion_skills: [skill-audit]}}
