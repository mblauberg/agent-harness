# Blank issues are disabled: every report should arrive with the fields that
# make it actionable. Discussions are not enabled on this repository yet; add a
# contact link here when they are.
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability (do not open an issue)
    url: https://github.com/<owner>/<repo>/blob/main/SECURITY.md
    about: >-
      Report privately through GitHub's private vulnerability-reporting or
      draft security-advisory flow. Never put exploit details, credentials,
      private prompts or personal data in a public issue.
