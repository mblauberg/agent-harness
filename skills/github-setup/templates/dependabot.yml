version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Only labels declared in .github/labels.yml; without this Dependabot
    # recreates its per-ecosystem default labels that the label sync prunes.
    labels:
      - dependencies

  # Duplicate this block per additional package ecosystem (npm, pip, cargo,
  # bundler, ...); keep `labels: [dependencies]` on every block so the label
  # sync never fights Dependabot's own defaults.
  # - package-ecosystem: npm
  #   directory: /
  #   schedule:
  #     interval: weekly
  #     day: monday
  #   open-pull-requests-limit: 10
  #   labels:
  #     - dependencies
